send_message:
  name: Send message
  description: Send a text message to a One2Track watch.
  fields:
    device_id:
      name: Device ID
      description: The UUID of the watch to send the message to.
      required: true
      selector:
        text:
    message:
      name: Message
      description: The message text to send.
      required: true
      selector:
        text:

set_phonebook:
  name: Set phonebook
  description: Set phonebook entries on a One2Track watch.
  fields:
    device_id:
      name: Device ID
      description: The UUID of the watch.
      required: true
      selector:
        text:
    entries:
      name: Entries
      description: List of phonebook entries with name and number.
      required: true
      selector:
        object:

set_quiet_times:
  name: Set quiet times
  description: Configure quiet times on a One2Track watch.
  fields:
    device_id:
      name: Device ID
      description: The UUID of the watch.
      required: true
      selector:
        text:
    enabled:
      name: Enabled
      description: Whether quiet times are enabled.
      required: true
      selector:
        boolean:
    start_time:
      name: Start time
      description: Start of quiet period (HH:MM format).
      default: "22:00"
      selector:
        time:
    end_time:
      name: End time
      description: End of quiet period (HH:MM format).
      default: "07:00"
      selector:
        time:
